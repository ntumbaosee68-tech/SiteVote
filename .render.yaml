services:
  - type: web
    name: vote-platform-python
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    disk:
      name: vote-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        value: change-me-in-production
      - key: PERSISTENT_DIR
        value: /data
